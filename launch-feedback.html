<!DOCTYPE HTML>
<html>
	<head>
		<title>Launch Feedback - Indie Art Lab</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/site.css" />
		<link rel="stylesheet" href="assets/css/art-prototype.css" />
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="main">
				<div class="inner">
					<header id="header">
						<a href="index.html" class="logo"><strong>Indie Art Lab</strong> Launch Feedback</a>
					</header>

					<section>
						<header class="major">
							<h2>정식 출시 알림 & 피드백</h2>
						</header>
						<p>출시 알림을 받을 이메일과 서비스 개선 의견을 남겨주세요.</p>

						<div class="art-tool-controls" style="max-width: 760px;">
							<div class="art-tool-field">
								<label for="submit-email">알림을 받으실 이메일</label>
								<input id="submit-email" type="email" placeholder="name@example.com" />
							</div>
							<div class="art-tool-field">
								<label for="submit-advice">서비스에 대한 조언</label>
								<textarea id="submit-advice" rows="6" placeholder="추가되길 원하는 기능, 개선할 점 등 의견을 남겨주세요."></textarea>
							</div>
						</div>

						<div class="art-tool-actions">
							<button style="width:350px;" id="submit" type="button" class="button primary">지금 제출!</button>
						</div>
					</section>
				</div>
			</div>

			<div id="sidebar">
				<div class="inner">
					<nav id="menu">
						<header class="major">
							<h2>Menu</h2>
						</header>
						<ul>
							<li><a href="index.html">메인 허브</a></li>
							<li><a href="color-replace.html">색상 대체</a></li>
							<li><a href="custom-palette.html">커스텀 팔레트</a></li>
							<li><a href="launch-feedback.html">출시 알림/피드백</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="assets/js/menu-active.js"></script>
		<script src="assets/js/launch-feedback.js?v=2"></script>
		<script src="assets/js/visitors.js"></script>
	</body>
</html>
