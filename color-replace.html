<html>
	<head>
		<title>Color Replace - Indie Art Lab</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/site.css" />
		<link rel="stylesheet" href="assets/css/art-prototype.css" />
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Main -->
					<div id="main">
						<div class="inner">

							<!-- Header -->
								<header id="header">
									<a href="index.html" class="logo"><strong>Indie Art Lab</strong> Color Replace</a>
								</header>

							<section id="color-key-mapping">
								<header class="major">
									<h2>색상 대체</h2>
								</header>
								<p>이미지의 주요 색상을 추출해 원하는 팔레트의 색으로 빠르게 치환합니다.</p>

								<div class="art-tool-controls">
									<div class="art-tool-field">
										<label for="replace-image-upload">이미지 업로드</label>
										<input id="replace-image-upload" type="file" accept="image/*" />
									</div>
									<div class="art-tool-field">
										<label for="key-color-count">추출 색상 개수</label>
										<select id="key-color-count">
											<option value="auto" selected>자동(기본값)</option>
											<option value="3">3</option>
											<option value="4">4</option>
											<option value="5">5</option>
											<option value="6">6</option>
											<option value="7">7</option>
											<option value="8">8</option>
										</select>
									</div>
									<div class="art-tool-field">
										<label for="replace-palette-select">저장 팔레트 불러오기</label>
										<select id="replace-palette-select"></select>
									</div>
									<div class="art-tool-field">
										<label for="replace-random-count">랜덤 후보 개수</label>
										<input id="replace-random-count" type="number" min="1" max="24" step="1" value="8" />
									</div>
									<div class="art-tool-field art-tool-range">
										<label for="replace-dedupe-strength">유사 색상 중복 방지 <span id="replace-dedupe-label">높음</span></label>
										<input id="replace-dedupe-strength" type="range" min="0" max="300" value="90" />
									</div>
								</div>

								<div class="art-tool-actions">
									<button id="extract-key-colors" type="button" class="button small">핵심 색상 추출</button>
									<button id="apply-shared-palette" type="button" class="button small">선택 팔레트 적용</button>
									<button id="reset-key-remap" type="button" class="button small">색상 초기화</button>
								</div>

								<div id="replace-random-results" class="art-tool-compare-grid"></div>

								<div class="art-tool-grid color-replace-edit-grid">
									<div id="key-color-list" class="key-color-list"></div>
									<div class="key-color-list">
										<div id="current-palette-hex-list" class="art-tool-swatches"></div>
										<p id="current-palette-copy-status" class="key-color-label"></p>
									</div>
								</div>

								<div class="art-tool-grid">
									<div class="art-tool-panel">
										<h3>원본</h3>
										<canvas id="replace-original-canvas" width="640" height="360"></canvas>
									</div>
									<div class="art-tool-panel">
										<div class="art-tool-panel-head">
											<h3>색상 치환 결과</h3>
											<div class="art-tool-actions">
												<button id="open-remap-fullscreen" type="button" class="button small">결과 크게 보기</button>
												<button id="download-remap" type="button" class="button small">이미지 저장</button>
											</div>
										</div>
										<canvas id="replace-remap-canvas" width="640" height="360"></canvas>
									</div>
								</div>
							</section>

						</div>
					</div>

				<div id="remap-fullscreen-modal" class="image-modal hidden" role="dialog" aria-modal="true" aria-label="색상 치환 결과 전체 보기">
					<div class="image-modal-stage">
						<button id="close-remap-fullscreen" type="button" class="image-modal-close button small">X</button>
						<img id="remap-fullscreen-image" alt="색상 치환 결과 크게 보기" />
					</div>
				</div>

				<!-- Sidebar -->
					<div id="sidebar">
						<div class="inner">

							<!-- Menu -->
								<nav id="menu">
									<header class="major">
										<h2>Menu</h2>
									</header>
									<ul>
										<li><a href="index.html">메인 허브</a></li>
										<li><a href="color-replace.html">색상 대체</a></li>
										<li><a href="custom-palette.html">커스텀 팔레트</a></li>
										<li><a href="launch-feedback.html">출시 알림/피드백</a></li>
									</ul>
								</nav>

						</div>
					</div>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="assets/js/menu-active.js"></script>
			<script src="assets/js/palette-store.js"></script>
			<script src="assets/js/color-extraction.js?v=5"></script>
			<script src="assets/js/color-replace.js?v=10"></script>
			<script src="assets/js/visitors.js"></script>

	</body>
</html>
